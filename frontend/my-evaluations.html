<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizzBox - My Evaluations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
:root {--bg:#f7f8fb;--surface:#fff;--text:#0f172a;--muted:#64748b;--primary:#f97316;--border:#e2e8f0;}body{margin:0;font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);background:var(--bg);} a{text-decoration:none;color:#334d7a;} .container{width:min(1180px,calc(100% - 2rem));margin:0 auto;padding:1rem 0;} .page-header{background:#fff;border-bottom:1px solid var(--border);padding:1rem 0;margin-bottom:1rem;} .page-header h1{margin:0;font-size:1.8rem;} .page-header p{margin:.4rem 0 0;color:#64748b;} .cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0.9rem;margin-top:1rem;} .eval-card{background:#fff;border:1px solid var(--border);border-radius:0.85rem;padding:1rem;position:relative;box-shadow:0 10px 20px rgba(25,41,67,.08);} .eval-card h3{margin:.2rem 0 .5rem;} .eval-card p{margin:0 0 .65rem;color:#566984;line-height:1.25;} .badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:700;text-transform:uppercase;border-radius:.4rem;padding:.2rem .55rem;background:#f9f2e7;color:#d97706;} .card-actions{margin-top:.8rem;display:flex;gap:.55rem;} .card-actions button,.card-actions a{border:none;background:#eef4ff;color:#2166aa;border-radius:.5rem;padding:.4rem .7rem;font-size:.79rem;font-weight:700;cursor:pointer;} .card-actions button.delete{background:#ffeaed;color:#c0213e;} .top-links{margin-top:0.75rem;display:flex;gap:.8rem;} .top-links a{color:#326491;font-weight:700;} .top-links a.active{color:var(--primary);} .info{margin-top:1rem;color:#47536d;font-size:.9rem;}
  </style>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Mes évaluations</h1>
      <p>Liste complète de vos évaluations. Vous pouvez modifier, supprimer ou recréer une évaluation.</p>
      <div class="top-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="create.html">Créer</a>
        <a class="active" href="my-evaluations.html">My Evaluations</a>
      </div>
    </header>

    <section>
      <input id="search-input" placeholder="Rechercher par titre ou description..." style="width:100%;padding:.75rem;border:1px solid #d8e6f6;border-radius:.65rem;" />
      <div class="info" id="stats-line">Chargement...</div>
      <div class="cards-grid" id="evaluations-container"></div>
    </section>

    <section style="margin-top:1.2rem;">
      <button class="btn primary" style="border:none;background:linear-gradient(125deg,var(--primary),#ff7a1c);color:#fff;border-radius:.6rem;padding:.65rem .9rem;cursor:pointer;" onclick="window.location.href='create.html';">+ Nouvelle évaluation</button>
    </section>
  </main>

  <script type="module">
    import api from './js/api.js';

    const token = localStorage.getItem('quizzbox_token');
    if (!token) {
      window.location.replace('login.html');
    }

    const statsLine = document.getElementById('stats-line');
    const container = document.getElementById('evaluations-container');

    function formatRow(ev) {
      const isShared = ev.visibility === 'SHARED';
      return `
        <article class="eval-card">
          <div class="badge">${isShared ? 'Shared' : 'Private'}</div>
          <h3>${ev.title || 'Sans titre'}</h3>
          <p>${ev.description || 'Aucune description'}</p>
          <p>${ev._count?.questions || 0} questions · ${ev.timePerQuestion || 'N/A'} sec/question</p>
          ${isShared ? `<p>Code : <strong>${ev.accessCode || '—'}</strong></p>` : ''}
          <div class="card-actions">
            <a href="create.html?edit=${ev.id}">Recomposer</a>
            <a href="results.html?evaluationId=${ev.id}">Résultats</a>
            <button class="delete" data-id="${ev.id}">Supprimer</button>
          </div>
        </article>
      `;
    }

    async function loadEvaluations(filter = '') {
      try {
        const evals = await api.evaluations.list();

        const filtered = evals.filter(ev => {
          const search = filter.toLowerCase();
          return ev.title.toLowerCase().includes(search) || (ev.description || '').toLowerCase().includes(search);
        });

        container.innerHTML = filtered.length ? filtered.map(ev => formatRow(ev)).join('') : '<p>Aucune évaluation trouvée.</p>';

        statsLine.textContent = `Total: ${filtered.length} | Partagées: ${filtered.filter(e => e.visibility === 'SHARED').length} | Privées: ${filtered.filter(e => e.visibility === 'PRIVATE').length}`;

        container.querySelectorAll('button.delete').forEach(btn => {
          btn.addEventListener('click', async () => {
            const evalId = btn.dataset.id;
            if (!confirm('Supprimer cette évaluation ?')) return;

            try {
              await api.evaluations.delete(evalId);
              await loadEvaluations(document.getElementById('search-input').value);
            } catch (error) {
              console.error('Suppression échouée', error);
              alert('Impossible de supprimer l\'évaluation. Rafraîchissez la page et réessayez.');
            }
          });
        });
      } catch (err) {
        console.error('Erreur chargement évaluations', err);
        statsLine.textContent = 'Erreur de chargement';
      }
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      loadEvaluations(e.target.value);
    });

    loadEvaluations();
  </script>
</body>
</html>
