<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizzBox - Evaluation Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
:root{--bg:#f7f9fc;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e3e9f4;--primary:#f97316;--shadow:0 16px 35px rgba(15,23,42,.14);}*{box-sizing:border-box;}body{margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);}a{color:var(--primary);text-decoration:none;} .container{width:min(1180px,calc(100% - 2rem));margin:0 auto;} .site-header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;} .header-inner{display:flex;align-items:center;justify-content:space-between;height:70px;gap:1rem;} .brand{font-size:1.5rem;font-weight:800;color:var(--primary);text-decoration:none;} .timer{font-weight:700;color:#2d405f;} .timer.warning {color:#dc2626;} .btn{transition:0.2s;} .btn.submit{background:linear-gradient(120deg,var(--primary),#ff7a10);color:#fff;border:none;border-radius:.7rem;padding:.62rem 1.15rem;cursor:pointer;font-weight:700;} .btn.submit:hover{opacity:0.9;} .session-page{padding:2rem 0;flex:1;} .question-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;} .question-head span{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:#f97316;font-weight:800;background:#fff4e6;padding:4px 10px;border-radius:6px;} .question-head h1{margin:0;font-size:2rem;font-weight:800;color:#15213d;} .quit{font-size:.85rem;font-weight:700;color:#65778f;} .quit:hover{color:#dc2626;} .question-card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.5rem;} .question-card p{margin:0 0 1.25rem;font-size:1.15rem;line-height:1.6;color:#0d1f3f;} .options{display:grid;gap:.68rem;} .option{background:#f8fbff;border:1px solid #d7e3f2;border-radius:.75rem;padding:.92rem .95rem;text-align:left;font-weight:600;color:#1f3e65;cursor:pointer;transition:.2s;} .option:hover{border-color:var(--primary);background:#fff5e9;} .option.selected{border-color:var(--primary);background:#fff5e9;box-shadow:0 0 0 2px rgba(249,115,22,0.2);} .progress-card{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:1rem;} .progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;font-size:.83rem;color:#566f91;} .progress-info strong{color:#f97316;} .progress-bar{width:100%;height:.75rem;background:#e7effa;border-radius:999px;overflow:hidden;} .progress-bar > div{width:20%;height:100%;background:linear-gradient(120deg,var(--primary),#ff7c18);transition:width 0.3s ease;} .site-footer{background:#fff;border-top:1px solid var(--border);padding:1rem 0;margin-top:auto;} .footer-inner{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:#8a9cb8;} .footer-inner nav a{margin-left:1rem;color:#5f7ea0;} @media(max-width:980px){.question-head{flex-direction:column;align-items:flex-start;} .header-inner{flex-wrap:wrap;justify-content:center;}.question-card p{font-size:1.1rem;}} @media(max-width:640px){.site-header{padding:.4rem 0;}.timer{display:none;}.question-head{gap:.5rem;} .question-head h1{font-size:1.5rem;} .question-card{padding:1.2rem;} }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="dashboard.html" class="brand">QuizzBox</a>
      <div class="timer" id="session-timer">⏱ --:-- remaining</div>
      <button class="btn submit" id="submit-btn">Soumettre →</button>
    </div>
  </header>

  <main class="session-page">
    <div class="container">
      <section class="question-head">
        <span id="section-label">Session en cours</span>
        <h1 id="question-indicator">Chargement…</h1>
        <a href="#" class="quit" id="quit-btn">Quitter l'évaluation</a>
      </section>

      <section class="question-card">
        <p id="question-text">Chargement de la question…</p>
        <div class="options" id="options-container"></div>
        <div id="session-message" style="margin-top:1rem;color:#dc2626;font-weight:700;"></div>
      </section>

      <section class="progress-card">
        <div class="progress-info">
          <span>Session Progress</span>
          <strong id="progress-text">0% Complete</strong>
        </div>
        <div class="progress-bar"><div id="progress-bar-fill"></div></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <small>© 2024 QuizzBox Tele-Evaluation. All rights reserved.</small>
      <nav><a href="#">Privacy Policy</a><a href="#">Terms of Service</a><a href="#">Support</a></nav>
    </div>
  </footer>

  <script type="module">
    import api from './js/api.js';

    // ── Auth check ──────────────────────────────────────────────────────────
    const token = localStorage.getItem('quizzbox_token');
    if (!token) {
      window.location.replace('login.html');
      throw new Error('Not authenticated');
    }

    const params       = new URLSearchParams(window.location.search);
    const evaluationId = params.get('id') || sessionStorage.getItem('current_eval_id');

    const questionTextEl    = document.getElementById('question-text');
    const optionsContainer  = document.getElementById('options-container');
    const progressText      = document.getElementById('progress-text');
    const progressBarFill   = document.getElementById('progress-bar-fill');
    const sessionMessage    = document.getElementById('session-message');
    const timerEl           = document.getElementById('session-timer');
    const questionIndicator = document.getElementById('question-indicator');

    let sessionId        = null;
    let selectedOptionId = null;
    let timerInterval    = null;

    // ── Timer ───────────────────────────────────────────────────────────────
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer(seconds) {
      stopTimer();
      let remaining = seconds;
      const tick = () => {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        timerEl.textContent = `⏱ ${m}:${s} remaining`;
        timerEl.classList.toggle('warning', remaining <= 10);
        if (remaining <= 0) { stopTimer(); onTimeout(); }
        remaining--;
      };
      tick();
      timerInterval = setInterval(tick, 1000);
    }

    async function onTimeout() {
      sessionMessage.textContent = '⏰ Temps écoulé — passage à la suite.';
      // Can't submit without selection — just load next
      await loadCurrentQuestion();
    }

    // ── Progress ────────────────────────────────────────────────────────────
    function setProgress(index, total) {
      const percent = total ? Math.round(((index + 1) / total) * 100) : 0;
      progressText.textContent = `${percent}% Complete`;
      progressBarFill.style.width = `${percent}%`;
    }

    // ── Render ──────────────────────────────────────────────────────────────
    function renderQuestion(qData) {
      if (!qData || !qData.question) {
        questionTextEl.textContent = 'Aucune question disponible.';
        return;
      }
      selectedOptionId = null;
      sessionMessage.textContent = '';
      questionTextEl.textContent = qData.question.text;

      optionsContainer.innerHTML = '';
      qData.question.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.text;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
          btn.classList.add('selected');
          selectedOptionId = opt.id;
        });
        optionsContainer.appendChild(btn);
      });

      setProgress(qData.currentIndex, qData.totalQuestions);
      questionIndicator.textContent =
        `Question ${qData.currentIndex + 1} sur ${qData.totalQuestions}`;

      startTimer(qData.timeLimit || 30);
    }

    // ── Error redirect ──────────────────────────────────────────────────────
    function errorRedirect(msg) {
      sessionMessage.textContent = msg;
      sessionStorage.removeItem('current_session_id');
      setTimeout(() => window.location.replace('join.html'), 2800);
    }

    // ── Load current question ───────────────────────────────────────────────
    async function loadCurrentQuestion() {
      try {
        const qData = await api.session.getCurrentQuestion(sessionId);
        renderQuestion(qData);
      } catch (err) {
        stopTimer();
        const msg = err.message || '';
        if (msg === 'No more questions' || msg === 'Session is already completed') {
          sessionStorage.removeItem('current_session_id');
          window.location.replace('results.html?session=' + sessionId);
        } else {
          console.error('loadCurrentQuestion:', err);
          sessionMessage.textContent = msg || 'Impossible de charger la question.';
        }
      }
    }

    // ── Submit answer ───────────────────────────────────────────────────────
    async function submitCurrentAnswer() {
      if (!selectedOptionId) {
        sessionMessage.textContent = 'Sélectionnez une option avant de soumettre.';
        return;
      }
      sessionMessage.textContent = '';
      stopTimer();

      try {
        const result = await api.session.submitAnswer(sessionId, selectedOptionId);
        if (result && result.result) {
          sessionStorage.removeItem('current_session_id');
          window.location.replace('results.html?session=' + sessionId);
          return;
        }
        await loadCurrentQuestion();
      } catch (err) {
        console.error('submitAnswer:', err);
        sessionMessage.textContent = err.message || "Impossible d'envoyer la réponse.";
        // Restart timer so the user can retry
        startTimer(30);
      }
    }

    // ── Start session ───────────────────────────────────────────────────────
    async function startSession() {
      // Resume an in-progress session
      const cached = sessionStorage.getItem('current_session_id');
      if (cached) {
        sessionId = cached;
        try {
          await loadCurrentQuestion();
          return;
        } catch (err) {
          // Stale session — fall through to create a new one
          sessionStorage.removeItem('current_session_id');
        }
      }

      if (!evaluationId) {
        errorRedirect("Évaluation introuvable. Retour à l'accueil…");
        return;
      }

      // Dev mock
      if (evaluationId.startsWith('mock-')) {
        sessionId = 'mock-session-' + Date.now();
        sessionStorage.setItem('current_session_id', sessionId);
        renderQuestion({
          question: { id: 'q1', text: 'Démonstration — aucune question réelle', options: [
            { id: 'o1', text: 'Option A' }, { id: 'o2', text: 'Option B' }
          ]},
          timeLimit: 30, currentIndex: 0, totalQuestions: 1
        });
        return;
      }

      try {
        questionTextEl.textContent = 'Démarrage de la session…';
        const started = await api.session.start(evaluationId);
        sessionId = started.id;
        sessionStorage.setItem('current_session_id', sessionId);
        await loadCurrentQuestion();
      } catch (err) {
        console.error('startSession:', err);
        errorRedirect(err.message || 'Impossible de démarrer la session.');
      }
    }

    // ── Listeners ───────────────────────────────────────────────────────────
    document.getElementById('submit-btn').addEventListener('click', (e) => {
      e.preventDefault();
      submitCurrentAnswer();
    });

    document.getElementById('quit-btn').addEventListener('click', (e) => {
      e.preventDefault();
      if (confirm('Êtes-vous sûr de vouloir quitter ? Votre progression sera perdue.')) {
        stopTimer();
        sessionStorage.removeItem('current_session_id');
        window.location.href = 'dashboard.html';
      }
    });

    // ── Boot ────────────────────────────────────────────────────────────────
    startSession();
  </script>
</body>
</html>
